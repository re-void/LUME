workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

stages:
  - meta
  - audit
  - lint
  - test
  - build

default:
  image: node:20-bookworm
  interruptible: true

pipeline_smoke:
  stage: meta
  script:
    - echo "Pipeline started for $CI_COMMIT_SHORT_SHA"

server_audit:
  stage: audit
  rules:
    - changes:
        - server/package.json
        - server/package-lock.json
        - .gitlab-ci.yml
  script:
    - cd server
    - npm ci --legacy-peer-deps
    - npm audit --audit-level=high --omit=dev
  allow_failure: false

client_audit:
  stage: audit
  rules:
    - changes:
        - client/package.json
        - client/package-lock.json
        - .gitlab-ci.yml
  script:
    - cd client
    - npm ci
    - npm audit --audit-level=high --omit=dev
  allow_failure: false

server_lint_typecheck:
  stage: lint
  rules:
    - changes:
        - server/**/*
        - .gitlab-ci.yml
  script:
    - cd server
    - npm ci --legacy-peer-deps
    - npm run type-check
    - npm run lint
    - npm run format:check

server_test:
  stage: test
  rules:
    - changes:
        - server/**/*
        - .gitlab-ci.yml
  script:
    - cd server
    - npm ci --legacy-peer-deps
    - npm test

server_build:
  stage: build
  rules:
    - changes:
        - server/**/*
        - .gitlab-ci.yml
  script:
    - cd server
    - npm ci --legacy-peer-deps
    - npm run build

client_lint:
  stage: lint
  rules:
    - changes:
        - client/**/*
        - .gitlab-ci.yml
  script:
    - cd client
    - npm ci
    - npm run lint

client_build:
  stage: build
  variables:
    NEXT_PUBLIC_WS_URL: ws://localhost:3001/ws
    NEXT_PUBLIC_API_URL: http://localhost:3001/api
  rules:
    - changes:
        - client/**/*
        - .gitlab-ci.yml
  script:
    - cd client
    - npm ci
    - npm run build
